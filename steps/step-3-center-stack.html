<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step 3 - Center Composition</title>
    <link rel="stylesheet" href="../styles/steps/step-3-center-stack.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-right">
          <span>Gmail</span>
          <span>Images</span>
          <span class="apps">Apps</span>
          <span class="avatar">A</span>
        </div>
      </header>

      <main class="main">
        <section class="center-stack">
          <div class="logo-block">Logo block aligned to final size</div>
          <div class="search-block">Search shell block with icons zone</div>
          <div class="buttons-block">Actions row block</div>
          <div class="language-block">Languages row block</div>
        </section>
      </main>

      <footer class="footer">
        <div class="country">Colombia</div>
        <div class="footer-links">Footer links zone</div>
      </footer>
    </div>
  </body>
</html>
